services:
  voice-assistant:
    build: .
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "10031:10031"  # ptt-api
      - "8880:8080"    # sqlite_web (容器8080 -> 主机8880)
    volumes:
      - .:/app            # 映射整个项目目录以便热重载
      - ./data:/app/data  # 显式映射 data 目录
    restart: unless-stopped
