services:
  voice-assistant:
    build: .
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - PTT_RERANKER_API_KEY=${PTT_RERANKER_API_KEY}
      - PTT_RERANKER_MODEL=${PTT_RERANKER_MODEL}
      - TZ=Asia/Shanghai
    ports:
      - "10031:10031"
      - "8880:8080"
    volumes:
      - ./data:/app/data
      - .:/app
    restart: unless-stopped
