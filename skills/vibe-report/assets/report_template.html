<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTT API Vibe Check Report</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .meta {
            color: var(--accent);
            font-size: 1rem;
        }
        .card {
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
        }
        .query-title {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--primary);
        }
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-intent { background: #dbeafe; color: #1e40af; }
        .badge-date { background: #fef3c7; color: #92400e; }
        .badge-success { background: #d1fae5; color: #065f46; }

        .section-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            margin-top: 16px;
            margin-bottom: 8px;
        }
        .reply-box {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
            font-size: 0.95rem;
        }
        /* Markdown overrides */
        .reply-box p { margin-top: 0; }
        .reply-box ul, .reply-box ol { padding-left: 20px; }
        
        .memories-list {
            list-style: none;
            padding: 0;
        }
        .memory-item {
            font-size: 0.85rem;
            padding: 8px;
            border-left: 3px solid var(--primary);
            background: #f8fafc;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .score { font-weight: 700; color: var(--success); }
        footer {
            text-align: center;
            margin-top: 60px;
            color: var(--accent);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Press-to-Talk Vibe Check</h1>
            <div class="meta">报告生成时间: {{current_time}} | 基准模拟时间: 2026-04-27</div>
        </header>
        
        <div id="results">
            <!-- Data will be injected here -->
        </div>

        <footer>
            &copy; 2026 Voice Assistant Project - Created by Gemini CLI
        </footer>
    </div>

    <script>
        const reportData = {{results_json}};
        const resultsContainer = document.getElementById('results');

        reportData.forEach(r => {
            const intent = r.debug_info?.intent?.intent || 'unknown';
            const tool = r.debug_info?.intent?.tool || '';
            const args = r.debug_info?.query_args || {};
            const dateRange = args.start_date ? `${args.start_date} 至 ${args.end_date}` : '全时段';
            
            let memoriesHtml = '';
            if (r.memories && r.memories.length > 0) {
                r.memories.forEach(m => {
                    memoriesHtml += `
                    <div class="memory-item">
                        <span>${m.memory}</span>
                        <span class="score">${(m.score || 0).toFixed(2)}</span>
                    </div>
                    `;
                });
            } else {
                memoriesHtml = '<p style="font-size: 0.8rem; color: #94a3b8;">没有命中的原始记忆</p>';
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <div>
                        <div class="query-title">${r.user_query}</div>
                        <div style="font-size: 0.8rem; color: #64748b; margin-top: 4px;">${r.desc}</div>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <span class="badge badge-intent">${intent} (${tool})</span>
                        <span class="badge badge-date">${dateRange}</span>
                    </div>
                </div>
                
                <div class="section-title">意图提取结果 (Refined Query)</div>
                <div style="font-weight: 600; color: #334155; margin-bottom: 12px;">${r.refined_query}</div>

                <div class="section-title">助手回复</div>
                <div class="reply-box" id="reply-${Math.random().toString(36).substr(2, 9)}"></div>

                <div class="section-title">检索到的记忆背景 (Top 5)</div>
                <div class="memories-list">
                    ${memoriesHtml}
                </div>
            `;
            
            resultsContainer.appendChild(card);
            
            // Render markdown in the box
            const replyBox = card.querySelector('.reply-box');
            replyBox.innerHTML = marked.parse(r.reply || '');
        });
    </script>
</body>
</html>
